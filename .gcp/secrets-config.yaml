# Secrets configuration for Cloud Build
# Maps berglas .env file names to Kubernetes SecretObjects per environment
# Developers just maintain .env files in berglas - this config maps them to K8s secrets
#
# NAMING STRATEGY:
# ================
# Berglas Secret Name Format: {BUCKET}/{REPO_NAME}-{ENV}-env
#   Example: secrets-bucket-flam/bootstrap-test-dev-env
#   Example: secrets-bucket-flam/bootstrap-test-nonprod-env
#   Example: secrets-bucket-flam/bootstrap-test-prod-env
#
# Kubernetes Secret Name Format: {REPO_NAME}-{ENV}-secrets
#   Example: bootstrap-test-dev-secrets
#   Example: bootstrap-test-nonprod-secrets
#   Example: bootstrap-test-prod-secrets
#
# HOW TO CREATE/UPDATE SECRETS:
# =============================
# 1. Create/update your .env file locally
# 2. Store it in berglas using the naming convention above:
#
#    berglas create secrets-bucket-flam/{REPO_NAME}-{ENV}-env \
#      @.env \
#      --key projects/prj-c-secrets-kvc2/locations/global/keyRings/berglas/cryptoKeys/berglas-key
#
#    Example for dev:
#    berglas create secrets-bucket-flam/bootstrap-test-dev-env \
#      @.env \
#      --key projects/prj-c-secrets-kvc2/locations/global/keyRings/berglas/cryptoKeys/berglas-key
#
#    To update an existing secret:
#    berglas update secrets-bucket-flam/{REPO_NAME}-{ENV}-env \
#      @.env \
#      --key projects/prj-c-secrets-kvc2/locations/global/keyRings/berglas/cryptoKeys/berglas-key
#
# 3. The Cloud Build pipeline will automatically:
#    - Read the .env file from berglas
#    - Parse all KEY=VALUE pairs
#    - Create/update the Kubernetes SecretObject with name: {REPO_NAME}-{ENV}-secrets
#    - Convert keys to lowercase with hyphens (e.g., TF_VAR_api_key -> tf-var-api-key)

environments:
  dev:
    project_id: "prj-d-fi-base-3cyk"
    namespace: "instant"
    secrets:
      # Berglas secret name will be auto-generated as: {bucket}/${REPO_NAME}-{ENV}-env
      # K8s secret name will be auto-generated as: ${REPO_NAME}-{ENV}-secrets
      - secret_type: "Opaque"  # Optional: "Opaque", "kubernetes.io/tls", "kubernetes.io/dockerconfigjson"
  prod:
    project_id: "prj-p-fi-base-50py"
    namespace: "instant"
    secrets:
      - secret_type: "Opaque"

# GKE cluster configuration per environment
clusters:
  dev:
    name: "fi-development-wmb8"
    location: "asia-south1"
  nonprod:
    name: "fi-nonproduction-0x8j"
    location: "asia-south1-b"
  prod:
    name: "fi-production-9u4f"
    location: "asia-south1"

# Berglas configuration
berglas:
  bucket: "secrets-bucket-flam"
  kms_key: "projects/prj-c-secrets-kvc2/locations/global/keyRings/berglas/cryptoKeys/berglas-key"

